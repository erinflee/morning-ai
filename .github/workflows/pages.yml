name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  # The daily pipeline commits report.json as the github-actions bot, and bot pushes can't
  # trigger workflows — so deploy when that pipeline *completes* instead. This is what keeps
  # the live site in sync with the newest daily fetch without a manual push.
  workflow_run:
    workflows: ["Daily research update"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Always deploy on push / manual run; for a pipeline-completion trigger, only deploy if it
    # actually succeeded (a failed pipeline produces no new report, so there's nothing to ship).
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
