name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  # The daily pipeline commits report.json as the github-actions bot, and bot pushes can't
  # trigger workflows — so deploy when that pipeline *completes* instead. This is what keeps
  # the live site in sync with the newest daily fetch without a manual push.
  workflow_run:
    workflows: ["Daily research update"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Always deploy on push / manual run; for a pipeline-completion trigger, only deploy if it
    # actually succeeded (a failed pipeline produces no new report, so there's nothing to ship).
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      # First attempt's URL, or the retry's if the first backend deploy flaked out.
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      # continue-on-error: a first-attempt backend flake must NOT fail the job — the retry below is
      # what decides success. Without this, a deploy the retry successfully recovers still reports
      # the whole run as red (exactly what happened 2026-07-04 and -06: attempt 1 hit the backend
      # flake, the retry deployed the site fine, yet the run showed failure). The live site updated
      # on both those days; only the run status was wrong.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      # The Pages backend intermittently rejects a freshly-created deployment with a generic
      # "Deployment failed, try again later." That's a server-side flake, not a content problem —
      # the same commit deploys fine on a second try. deploy-pages' own error_count/timeout only
      # cover status-polling hiccups, so retry the whole deploy once. Gate on the first attempt's
      # `outcome` (not failure()): continue-on-error marks its conclusion as success, so failure()
      # would read false and the retry would never fire.
      - name: Pause before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      # No continue-on-error here: if this second attempt also fails, the job SHOULD go red — that's
      # a real, sustained outage worth surfacing, not a transient blip the retry can paper over.
      - name: Retry deploy to GitHub Pages
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
