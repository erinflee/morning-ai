name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  # The daily pipeline commits report.json as the github-actions bot, and bot pushes can't
  # trigger workflows — so deploy when that pipeline *completes* instead. This is what keeps
  # the live site in sync with the newest daily fetch without a manual push.
  workflow_run:
    workflows: ["Daily research update"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: read   # the verify step below reads the real deployment status via the API

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Always deploy on push / manual run; for a pipeline-completion trigger, only deploy if it
    # actually succeeded (a failed pipeline produces no new report, so there's nothing to ship).
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      # First attempt's URL, or the retry's if the first backend deploy flaked out.
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # The Pages backend intermittently rejects a freshly-created deployment with a generic
      # "Deployment failed, try again later." (it did on 2026-07-02 and -03). That's a server-side
      # flake, not a content problem — the same commit deploys fine on a second try. deploy-pages'
      # own error_count/timeout only cover status-polling hiccups, so retry the whole deploy once.
      - name: Pause before retry
        if: failure() && steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Retry deploy to GitHub Pages
        id: deployment_retry
        if: failure() && steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      # deploy-pages can print "Reported success!" and exit 0 even when GitHub finalizes the Pages
      # deployment as FAILED a couple seconds later — observed 2026-07-06, where the action reported
      # success at 16:32:53 but the deployment record went to "failure" at 16:32:55. So the action's
      # exit code is not a trustworthy signal of whether the site actually updated. Tie this job's
      # pass/fail to the real deployment record instead: poll the latest github-pages deployment
      # until it reaches a terminal state, and fail the run if that state isn't "success".
      - name: Verify the deployment actually went live
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          repo="${{ github.repository }}"
          id=$(gh api "repos/$repo/deployments?environment=github-pages&per_page=1" --jq '.[0].id')
          echo "Verifying github-pages deployment $id ..."
          for i in $(seq 1 12); do
            state=$(gh api "repos/$repo/deployments/$id/statuses?per_page=1" --jq '.[0].state // "pending"')
            echo "check $i: state=$state"
            case "$state" in
              success)       echo "Confirmed: the site is live."; exit 0 ;;
              failure|error) echo "::error::Pages deployment finalized as '$state' — the site did NOT update."; exit 1 ;;
              *)             sleep 5 ;;
            esac
          done
          echo "::error::Pages deployment never reached a terminal state within the timeout."
          exit 1
